<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🆓 무료채팅 - Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; font-family: sans-serif; background:#0f0f0f; color:#fff; height:100vh; display:flex; flex-direction:column; }
    h2 { padding:15px; background:#111; text-align:center; margin:0; }
    #chat { flex:1; overflow-y:auto; padding:20px; background:#1a1a1a; }
    .msg { margin:12px 0; padding:12px 16px; border-radius:18px; max-width:80%; word-break:break-all; }
    .me { background:#007bff; margin-left:auto; text-align:right; }
    .other { background:#333; margin-right:auto; }
    #input-area { padding:12px; background:#0f0f0f; display:flex; gap:8px; }
    input { flex:1; padding:16px; border:none; border-radius:999px; background:#222; color:white; font-size:16px; }
    button { padding:0 28px; background:#007bff; border:none; color:white; border-radius:999px; cursor:pointer; font-weight:bold; }
  </style>
</head>
<body>
  <h2>🆓 실시간 무료채팅방</h2>
  <div id="chat"></div>
  
  <div id="input-area">
    <input type="text" id="username" placeholder="이름" value="익명">
    <input type="text" id="message" placeholder="메시지 입력 후 Enter" autocomplete="off">
    <button onclick="sendMessage()">전송</button>
  </div>

  <script>
    const supabaseUrl = 'https://iyeijbuktgdxizsvdsiq.supabase.co';
    const supabaseKey = 'sb_publishable_a7jhT7iBqodL4pNamjLcqg_i5NTobTi...';  // 너가 준 키 전체로 바꿔

    const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

    const messages = supabase.channel('chat');

    // 실시간 메시지 받기
    messages.on('broadcast', { event: 'message' }, ({ payload }) => {
      const div = document.createElement('div');
      const isMe = payload.name === document.getElementById('username').value;
      div.className = `msg ${isMe ? 'me' : 'other'}`;
      div.innerHTML = `<strong>${payload.name}</strong><br>${payload.text}<br><small>${payload.time}</small>`;
      document.getElementById('chat').appendChild(div);
      document.getElementById('chat').scrollTop = 999999;
    }).subscribe();

    function sendMessage() {
      const name = document.getElementById('username').value.trim() || "익명";
      const text = document.getElementById('message').value.trim();
      if (!text) return;

      const time = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});

      messages.send({
        type: 'broadcast',
        event: 'message',
        payload: { name, text, time }
      });

      document.getElementById('message').value = '';
    }

    document.getElementById('message').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
