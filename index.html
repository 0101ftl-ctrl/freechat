<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🆓 무료채팅 - 누구나</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { margin:0; font-family: sans-serif; background: #0f0f0f; color: #fff; height:100vh; display:flex; flex-direction:column; }
    #chat { flex:1; overflow-y:auto; padding:20px; background:#1a1a1a; }
    .msg { margin:12px 0; padding:12px 16px; border-radius:18px; max-width:80%; word-break:break-all; }
    .me { background:#007bff; margin-left:auto; text-align:right; border-bottom-right-radius:4px; }
    .other { background:#333; margin-right:auto; border-bottom-left-radius:4px; }
    #input-area { padding:12px; background:#0f0f0f; display:flex; gap:8px; }
    input { flex:1; padding:16px; border:none; border-radius:999px; font-size:17px; background:#222; color:white; }
    button { padding:0 28px; background:#007bff; border:none; color:white; border-radius:999px; cursor:pointer; font-weight:bold; }
  </style>
</head>
<body>
  <h2 style="margin:0; padding:15px; background:#111; text-align:center; font-size:22px;">🆓 실시간 무료채팅방</h2>
  <div id="chat"></div>
  
  <div id="input-area">
    <input type="text" id="username" placeholder="이름" value="익명">
    <input type="text" id="message" placeholder="메시지 입력 후 Enter" autocomplete="off">
    <button onclick="sendMessage()">전송</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCSRN6E-HQzkUNJvrNAvCGwSgg-j-QZLxg",
      authDomain: "my-free-chat01.firebaseapp.com",
      databaseURL: "https://my-free-chat01-default-rtdb.firebaseio.com",
      projectId: "my-free-chat01",
      storageBucket: "my-free-chat01.firebasestorage.app",
      messagingSenderId: "209465427211",
      appId: "1:209465427211:web:e16e88fe4cf37da32a4e0e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messagesRef = db.ref('messages');

    messagesRef.on('child_added', (snap) => {
      const msg = snap.val();
      const div = document.createElement('div');
      const isMe = msg.name === document.getElementById('username').value;
      div.className = `msg ${isMe ? 'me' : 'other'}`;
      div.innerHTML = `<strong>${msg.name}</strong><br>${msg.text}<br><small style="opacity:0.6">${msg.time}</small>`;
      document.getElementById('chat').appendChild(div);
      document.getElementById('chat').scrollTop = 999999;
    });

    function sendMessage() {
      const name = document.getElementById('username').value.trim() || "익명";
      const text = document.getElementById('message').value.trim();
      if (!text) return;

      const time = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
      messagesRef.push({ name, text, time });
      document.getElementById('message').value = '';
    }

    document.getElementById('message').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
